<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hear · Breathe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>const t=localStorage.getItem('bf-theme');if(t)document.documentElement.classList.add('theme-'+t);</script>
</head>
<body>
    <div class="screen active">
        <div class="content content--hear content--has-tracker">
            <header class="page-header">
                <span class="step-badge">Step 3 of 5 &nbsp;·&nbsp; Hear</span>
                <h1 class="heading">What can you hear?</h1>
                <p class="subheading">Capture 3 sounds around you</p>
            </header>

            <div class="audio-card">
                <svg class="audio-symbol" viewBox="0 0 36 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="15" width="9" height="10" rx="1.5" stroke="currentColor" stroke-width="2.5"/>
                    <path d="M11 15 L23 5 L23 35 L11 25 Z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
                </svg>
                <div class="audio-bars" id="audioBars">
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                    <div class="audio-bar"></div>
                </div>
            </div>

            <div class="hear-leds">
                <div class="hear-led" id="led1"></div>
                <div class="hear-led" id="led2"></div>
                <div class="hear-led" id="led3"></div>
            </div>

            <button class="btn--record" id="btnRecord" aria-label="Record sound"></button>
            <p class="hear-status" id="hearStatus">Tap to record</p>
        </div>

        <div class="prog-track">
            <img class="prog-lily" src="images/lily.png" alt="">
            <div class="prog-line">
                <div class="prog-line-fill" style="width:44%"></div>
                <div class="prog-butterfly" id="progButterfly" style="left:44%">
                    <img class="prog-bf-img" src="" alt="">
                </div>
            </div>
        </div>
    </div>

    <script>
        const TOTAL_RECORDINGS = 3;
        let recordingCount = 0;
        let mediaRecorder  = null;
        let audioStream    = null;
        let audioCtx       = null;
        let analyser       = null;
        let audioAnimFrame = null;
        let isRecording    = false;
        let autoStopTimer  = null;

        const audioBarsEl  = document.getElementById('audioBars');
        const hearStatus   = document.getElementById('hearStatus');
        const btnRecord    = document.getElementById('btnRecord');
        const leds         = [
            document.getElementById('led1'),
            document.getElementById('led2'),
            document.getElementById('led3'),
        ];

        function lightLed(index) {
            if (leds[index]) leds[index].classList.add('lit');
        }

        function resetBars() {
            cancelAnimationFrame(audioAnimFrame);
            audioBarsEl.querySelectorAll('.audio-bar').forEach(b => b.style.height = '3px');
        }

        function animateBars() {
            const bars = audioBarsEl.querySelectorAll('.audio-bar');
            const data = new Uint8Array(analyser.frequencyBinCount);
            (function draw() {
                audioAnimFrame = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(data);
                bars.forEach((bar, i) => {
                    const h = Math.max(4, (data[Math.floor(i * data.length / bars.length)] / 255) * 40 + 4);
                    bar.style.height = h + 'px';
                });
            })();
        }

        function setRecordingState(active) {
            btnRecord.classList.toggle('recording', active);
            audioBarsEl.classList.toggle('recording', active);
        }

        function stopAudio() {
            clearTimeout(autoStopTimer);
            if (mediaRecorder && mediaRecorder.state !== 'inactive') { isRecording = false; mediaRecorder.stop(); }
            cancelAnimationFrame(audioAnimFrame);
            if (audioStream) { audioStream.getTracks().forEach(t => t.stop()); audioStream = null; }
            if (audioCtx)    { audioCtx.close(); audioCtx = null; analyser = null; }
        }

        function stopRecording() {
            clearTimeout(autoStopTimer);
            setRecordingState(false);
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        }

        async function startRecording() {
            if (!audioStream) {
                try {
                    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } catch (err) {
                    hearStatus.textContent = 'Microphone access needed.';
                    return;
                }
            }
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 64;
                audioCtx.createMediaStreamSource(audioStream).connect(analyser);
            }

            const chunks = [];
            mediaRecorder = new MediaRecorder(audioStream);
            mediaRecorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
            mediaRecorder.onstop = () => {
                isRecording = false;
                setRecordingState(false);
                resetBars();
                lightLed(recordingCount);
                recordingCount++;

                if (recordingCount >= TOTAL_RECORDINGS) {
                    hearStatus.textContent = 'Beautiful. Well done.';
                    btnRecord.disabled = true;
                    setTimeout(() => { stopAudio(); window.location.href = 'smell.html'; }, 900);
                } else {
                    hearStatus.textContent = 'Nice one! Find another.';
                }
            };

            mediaRecorder.start();
            isRecording = true;
            setRecordingState(true);
            hearStatus.textContent = 'Recording… tap to stop';
            animateBars();
            autoStopTimer = setTimeout(() => { if (isRecording) stopRecording(); }, 5000);
        }

        btnRecord.addEventListener('click', () => {
            isRecording ? stopRecording() : startRecording();
        });

        (function() {
            const _t = localStorage.getItem('bf-theme') || '';
            const _f = {'': 'images/swallowtail-flap.gif', 'monarch': 'images/monarch-flap.gif', 'morpho': 'images/bluemorpho-flap.gif'};
            document.querySelector('.prog-bf-img').src = _f[_t] || _f[''];
        })();

        (function(){ const m=document.getElementById('bgMusic'); const t=parseFloat(localStorage.getItem('music-time')||'0'); if(localStorage.getItem('music-on')!=='false'){ m.play().then(()=>{ if(t>0)m.currentTime=t; }).catch(()=>{}); } window.addEventListener('pagehide',()=>localStorage.setItem('music-time',m.currentTime)); })();
    </script>
    <audio id="bgMusic" loop src="Pufino - Hopeful (freetouse.com).mp3"></audio>
</body>
</html>
