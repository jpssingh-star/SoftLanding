<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft Landing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>const t=localStorage.getItem('bf-theme');if(t)document.documentElement.classList.add('theme-'+t);</script>
</head>
<body>
    <div class="screen active screen--breathing">
        <div class="home-top-bar">
            <div class="species-picker" id="speciesPicker">
                <button class="species-btn" data-theme="" data-gif="images/swallowtail.gif">
                    <img class="species-icon" src="images/swallowtail.png" alt="">
                    <span>Swallowtail</span>
                </button>
                <button class="species-btn" data-theme="monarch" data-gif="images/monarch.gif">
                    <img class="species-icon" src="images/monarch.png" alt="">
                    <span>Monarch</span>
                </button>
                <button class="species-btn" data-theme="morpho" data-gif="images/bluemorpho.gif">
                    <img class="species-icon" src="images/bluemorpho.png" alt="">
                    <span>Blue Morpho</span>
                </button>
            </div>
            <button class="sound-toggle" id="soundToggle" aria-label="Toggle music"></button>
        </div>
        <div class="content breathing-content">
            <img class="butterfly-video" id="butterflyVideo" src="images/swallowtail.gif" alt="">
            <header class="page-header">
                <h1 class="heading heading--light">Soft Landing</h1>
                <p class="subheading subheading--light">Grounding made gentle</p>
            </header>
            <div class="btn-group">
                <button class="btn btn--fill" id="btnReady">I'm ready</button>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop src="Pufino - Hopeful (freetouse.com).mp3"></audio>

    <script>
        // Species picker
        const bfImg = document.getElementById('butterflyVideo');
        const GIFS = {
            '':       'images/swallowtail.gif',
            'monarch':'images/monarch.gif',
            'morpho': 'images/bluemorpho.gif',
        };

        function applyTheme(theme, gifSrc) {
            localStorage.setItem('bf-theme', theme);
            document.documentElement.classList.remove('theme-monarch', 'theme-morpho');
            if (theme) document.documentElement.classList.add('theme-' + theme);
            bfImg.src = gifSrc || GIFS[theme] || GIFS[''];
        }

        const saved = localStorage.getItem('bf-theme') || '';
        document.querySelectorAll('.species-btn').forEach(btn => {
            if (btn.dataset.theme === saved) btn.classList.add('active');
            btn.addEventListener('click', () => {
                document.querySelectorAll('.species-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyTheme(btn.dataset.theme, btn.dataset.gif);
            });
        });

        // Restore saved gif on load
        applyTheme(saved);

        document.getElementById('btnReady').addEventListener('click', () => {
            bfImg.classList.add('flying-up');
            if (musicOn) { music.play().catch(() => {}); }
            setTimeout(() => { window.location.href = 'camera.html'; }, 680);
        });

        // ── Music toggle ──────────────────────────────────────
        const music = document.getElementById('bgMusic');
        const toggleBtn = document.getElementById('soundToggle');
        let musicOn = localStorage.getItem('music-on') !== 'false'; // default on

        const ICON_ON  = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
        const ICON_OFF = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`;

        function applyMusicState(play) {
            musicOn = play;
            localStorage.setItem('music-on', play ? 'true' : 'false');
            toggleBtn.innerHTML = play ? ICON_ON : ICON_OFF;
            toggleBtn.setAttribute('aria-label', play ? 'Music on' : 'Music off');
            if (play) {
                const t = parseFloat(localStorage.getItem('music-time') || '0');
                music.play().catch(() => {});
                if (t > 0) { music.currentTime = t; }
            } else {
                music.pause();
            }
        }

        toggleBtn.addEventListener('click', () => applyMusicState(!musicOn));
        window.addEventListener('pagehide', () => { localStorage.setItem('music-time', music.currentTime); });

        // Auto-start if preference is on (requires user gesture — handled on btnReady)
        applyMusicState(musicOn);
    </script>
</body>
</html>
