<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grounded · Breathe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>const t=localStorage.getItem('bf-theme');if(t)document.documentElement.classList.add('theme-'+t);</script>
</head>
<body>
    <div class="confetti-layer" id="confettiLayer"></div>
    <div class="screen active screen--breathing">
        <div class="content breathing-content">
            <video class="butterfly-video" autoplay loop muted playsinline>
                <source src="images/breathingbutterfly.mp4" type="video/mp4">
            </video>

            <header class="page-header">
                <h1 class="heading heading--light">You grounded yourself.</h1>
                <p class="subheading subheading--light">5 · 4 · 3 · 2 · 1 — you did it.</p>
            </header>

            <footer class="btn-group">
                <button class="btn btn--fill" id="btnClose">Close</button>
            </footer>
        </div>

        <div class="prog-track prog-track--complete">
            <img class="prog-lily" src="images/lily.png" alt="">
            <div class="prog-line">
                <div class="prog-line-fill" style="width:100%"></div>
                <div class="prog-butterfly prog-butterfly--landed" id="progButterfly" style="left:calc(100% + 20px)">
                    <div class="prog-bf-icon">
                        <div class="prog-wing prog-wing--l"></div>
                        <div class="prog-wing prog-wing--r"></div>
                        <div class="prog-bf-body"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('btnClose').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        setTimeout(() => { const b = document.getElementById('progButterfly'); if(b){ b.classList.add('flapping'); setTimeout(()=>b.classList.remove('flapping'),1800); } }, 400);

        // ── Confetti burst ────────────────────────────────────
        (function launchConfetti() {
            const layer  = document.getElementById('confettiLayer');
            const colors = [
                'var(--yellow)', 'var(--yellow-deep)', 'var(--yellow-pale)',
                'var(--teal)',   'var(--teal-deep)',   '#fff'
            ];
            const COUNT = 54;

            function spawnParticle(delay) {
                const el = document.createElement('img');
                el.src = 'images/lily.png';
                el.className = 'conf conf-lily';

                const x        = 5 + Math.random() * 90;
                const duration = 2.0 + Math.random() * 2.4;
                const size     = 0.8 + Math.random() * 0.8;
                const rotStart = Math.random() * 360;

                el.style.cssText = `
                    left: ${x}%;
                    transform: rotate(${rotStart}deg) scale(${size});
                    animation-name: confFall;
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                    animation-fill-mode: forwards;
                `;

                layer.appendChild(el);
                setTimeout(() => el.remove(), (delay + duration + 0.2) * 1000);
            }

            // First burst: staggered over 0.6 s
            for (let i = 0; i < COUNT; i++) {
                spawnParticle(i * (0.6 / COUNT));
            }
            // Second smaller burst at 1.2 s
            setTimeout(() => {
                for (let i = 0; i < 24; i++) spawnParticle(i * 0.04);
            }, 1200);
        })();

        if (localStorage.getItem('music-on') !== 'false') { document.getElementById('bgMusic').play().catch(() => {}); }
    </script>
    <audio id="bgMusic" loop src="images/theme-music.mp3"></audio>
</body>
</html>
