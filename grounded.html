<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grounded · Breathe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>const t=localStorage.getItem('bf-theme');if(t)document.documentElement.classList.add('theme-'+t);</script>
</head>
<body>
    <div class="confetti-layer" id="confettiLayer"></div>
    <div class="screen active screen--breathing">
        <div class="content breathing-content">
            <img class="butterfly-video" id="butterflyGif" src="" alt="">

            <header class="page-header">
                <h1 class="heading heading--light">You landed softly.</h1>
                <p class="subheading subheading--light">5 · 4 · 3 · 2 · 1 — you did it.</p>
            </header>

            <footer class="btn-group">
                <button class="btn btn--fill" id="btnClose">Close</button>
            </footer>
        </div>

        <div class="prog-track prog-track--complete">
            <img class="prog-lily" src="images/lily.png" alt="">
            <div class="prog-line">
                <div class="prog-line-fill" style="width:100%"></div>
                <div class="prog-butterfly prog-butterfly--landed" id="progButterfly" style="left:calc(100% + 20px)">
                    <img class="prog-bf-img" src="" alt="">
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('btnClose').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        (function() {
            const _t = localStorage.getItem('bf-theme') || '';
            const _g = {'': 'images/swallowtail.gif', 'monarch': 'images/monarch.gif', 'morpho': 'images/bluemorpho.gif'};
            const _f = {'': 'images/swallowtail-flap.gif', 'monarch': 'images/monarch-flap.gif', 'morpho': 'images/bluemorpho-flap.gif'};
            document.getElementById('butterflyGif').src = _g[_t] || _g[''];
            document.querySelector('.prog-bf-img').src = _f[_t] || _f[''];
        })();

        // ── Confetti burst ────────────────────────────────────
        (function launchConfetti() {
            const layer  = document.getElementById('confettiLayer');
            const colors = [
                'var(--yellow)', 'var(--yellow-deep)', 'var(--yellow-pale)',
                'var(--teal)',   'var(--teal-deep)',   '#fff'
            ];
            const COUNT = 54;

            function spawnParticle(delay) {
                const el = document.createElement('img');
                el.src = 'images/lily.png';
                el.className = 'conf conf-lily';

                const x        = 5 + Math.random() * 90;
                const duration = 2.0 + Math.random() * 2.4;
                const sizePx   = 18 + Math.random() * 82;
                const rotStart = Math.random() * 360;

                el.style.cssText = `
                    left: ${x}%;
                    width: ${sizePx}px;
                    transform: rotate(${rotStart}deg);
                    animation-name: confFall;
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                    animation-fill-mode: forwards;
                `;

                layer.appendChild(el);
                setTimeout(() => el.remove(), (delay + duration + 0.2) * 1000);
            }

            // First burst: staggered over 0.6 s
            for (let i = 0; i < COUNT; i++) {
                spawnParticle(i * (0.6 / COUNT));
            }
            // Second smaller burst at 1.2 s
            setTimeout(() => {
                for (let i = 0; i < 24; i++) spawnParticle(i * 0.04);
            }, 1200);
        })();

        (function(){ const m=document.getElementById('bgMusic'); const t=parseFloat(localStorage.getItem('music-time')||'0'); if(localStorage.getItem('music-on')!=='false'){ m.play().then(()=>{ if(t>0)m.currentTime=t; }).catch(()=>{}); } window.addEventListener('pagehide',()=>localStorage.setItem('music-time',m.currentTime)); })();
    </script>
    <audio id="bgMusic" loop src="Pufino - Hopeful (freetouse.com).mp3"></audio>
</body>
</html>
