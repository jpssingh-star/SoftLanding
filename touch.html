<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feel · Breathe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>const t=localStorage.getItem('bf-theme');if(t)document.documentElement.classList.add('theme-'+t);</script>
</head>
<body>
    <div class="screen active">
<div class="content content--touch content--has-tracker">
            <header class="page-header">
                <span class="step-badge">Step 2 of 5 &nbsp;·&nbsp; Touch</span>
                <h1 class="heading">What can you feel?</h1>
                <p class="subheading">Touch 4 things around you</p>
            </header>

            <div class="touch-grid" id="touchGrid"></div>

            <p class="touch-progress" id="touchProgress">0 of 4 touched</p>
        </div>

        <div class="prog-track">
            <img class="prog-lily" src="images/lily.png" alt="">
            <div class="prog-line">
                <div class="prog-line-fill" style="width:22%"></div>
                <div class="prog-butterfly" id="progButterfly" style="left:22%">
                    <img class="prog-bf-img" src="" alt="">
                </div>
            </div>
        </div>
    </div>

    <script>
        function pickRandom(arr, n) {
            return [...arr].sort(() => Math.random() - 0.5).slice(0, n);
        }

        const TOUCH_POOL = [
            { emoji: '⚷', label: 'keys'           },
            { emoji: '✎', label: 'pencil'         },
            { emoji: '✄', label: 'stationary'       },
            { emoji: '≈', label: 'water'          },
            { emoji: '❀', label: 'plant'          },
            { emoji: '♫', label: 'headphones'     },
            { emoji: '↯', label: 'charger'        },
            { emoji: '⊟', label: 'box'            },
            { emoji: '✸', label: 'spiky object'},
            { emoji: '❦', label: 'cute object'},
            { emoji: '❅', label: 'cold object' },
            { emoji: '▬', label: 'smooth object' },
            { emoji: '⚓︎', label: 'heavy object'},
            { emoji: '○', label: 'round object'},
        ];

        const TOTAL_TOUCH   = 4;
        let   touchDoneCount = 0;

        const touchGridEl   = document.getElementById('touchGrid');
        const touchProgress = document.getElementById('touchProgress');

        pickRandom(TOUCH_POOL, 12).forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'touch-item';
            btn.innerHTML = `
                <span class="touch-emoji">${item.emoji}</span>
                <span class="touch-label">${item.label}</span>
            `;
            btn.addEventListener('click', () => {
                if (btn.classList.contains('checked')) return;
                btn.classList.add('popping');
                btn.addEventListener('animationend', () => {
                    btn.classList.remove('popping');
                    btn.classList.add('checked');
                    touchDoneCount++;
                    touchProgress.textContent = `${touchDoneCount} of ${TOTAL_TOUCH} touched`;
                    if (touchDoneCount >= TOTAL_TOUCH) {
                        touchProgress.classList.add('complete');
                        touchProgress.textContent = 'All done ✓';
                        setTimeout(() => {
                            document.querySelector('.screen').classList.add('screen--leaving');
                            setTimeout(() => { window.location.href = 'hear.html'; }, 320);
                        }, 380);
                    }
                }, { once: true });
            });
            touchGridEl.appendChild(btn);
        });

        (function() {
            const _t = localStorage.getItem('bf-theme') || '';
            const _f = {'': 'images/swallowtail-flap.gif', 'monarch': 'images/monarch-flap.gif', 'morpho': 'images/bluemorpho-flap.gif'};
            document.querySelector('.prog-bf-img').src = _f[_t] || _f[''];
        })();

        (function(){ const m=document.getElementById('bgMusic'); const t=parseFloat(localStorage.getItem('music-time')||'0'); if(localStorage.getItem('music-on')!=='false'){ m.play().then(()=>{ if(t>0)m.currentTime=t; }).catch(()=>{}); } window.addEventListener('pagehide',()=>localStorage.setItem('music-time',m.currentTime)); })();
    </script>
    <audio id="bgMusic" loop src="Pufino - Hopeful (freetouse.com).mp3"></audio>
</body>
</html>
